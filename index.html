<!DOCTYPE html>
<html>
<head>
  <title>Shoes Store</title>
  <style>
    body { font-family: Arial; }
    .product { border:1px solid #ccc; padding:10px; margin:10px; display:inline-block; }
    img { width:150px; }
    .admin { display:none; }
  </style>
</head>

<body>

<h1>Shoes Store</h1>

<!-- Products -->
<div id="products"></div>

<script>
let products = [
  {name:"Nike Shoes", price:2500, img:"https://via.placeholder.com/150"},
  {name:"Adidas Shoes", price:3000, img:"https://via.placeholder.com/150"},
  {name:"Puma Shoes", price:2800, img:"https://via.placeholder.com/150"}
];

function showProducts(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p=>{
    container.innerHTML += `
      <div class="product">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>Rs ${p.price}</p>
        <a href="https://wa.me/923244504436?text=I want to buy ${p.name}">
          Order on WhatsApp
        </a>
      </div>
    `;
  });
}

showProducts();
</script>

</body>
</html>
